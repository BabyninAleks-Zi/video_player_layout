<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Видео плеер</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./media/player-favicon.svg">
  <link rel="stylesheet" href="./static/bootstrap.min.css">
  <link rel="stylesheet" href="./static/font-awesome.min.css">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }

    .player-shell {
      width: 806px;
      margin: 6px auto 0;
    }

    .player {
      width: 806px;
    }

    .player .player-frame {
      width: 806px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #cfcfcf;
      background: #0b0b0b;
    }

    .player .screen {
      position: relative;
      width: 100%;
      height: 514px;
      background: #0b0b0b;
    }

    .player .player-video-content {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 468px;
      background: #000;
    }

    .player .bottom-controls {
      display: flex;
      align-items: flex-end;
      flex-wrap: nowrap;
      gap: 14px;
      height: 90px;
      padding: 0 10px 10px;
      background: #0b0b0b;
    }

    .player .left-buttons,
    .player .right-buttons {
      display: flex;
      align-items: center;
      gap: 19px;
      flex: 0 0 auto;
      min-height: 30px;
    }

    .player .viewing-panel {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
      min-height: 30px;
    }

    .player .player-button {
      padding: 0;
      border: 0;
      line-height: 1;
      color: #fff;
      cursor: pointer;
      background: transparent;
    }

    .player .player-button:hover,
    .player .player-button:focus-visible {
      color: #fff;
      background: transparent;
    }

    .player .player-button .fa {
      font-size: 20px;
    }

    .player .viewing-time,
    .player .video-duration {
      min-width: 60px;
      color: #fff;
      text-align: center;
      white-space: nowrap;
      font-family: "Roboto", sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 1;
    }

    .player .viewing-progressbar {
      flex: 1;
      min-width: 80px;
      height: 5px;
      cursor: pointer;
      overflow: visible;
      border-radius: 999px;
      background: transparent;
    }

    .player .viewing-progressbar-fill {
      position: relative;
      width: 0;
      height: 100%;
      color: transparent;
      font-size: 0;
      line-height: 0;
      border-radius: 999px;
      background: #ff0000;
    }

    .player .viewing-progressbar-fill::after {
      content: "";
      position: absolute;
      top: 50%;
      right: -7px;
      width: 14px;
      height: 14px;
      transform: translateY(-50%);
      border: 3px solid #fff;
      border-radius: 50%;
      background: #ff0000;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .player .viewing-progressbar:hover .viewing-progressbar-fill::after {
      opacity: 1;
    }
  </style>
</head>
<body>
  <main class="player-shell">
    <div id="player" class="player">
      <div class="player-frame">
        <div class="screen">
          <div class="js-video-container player-video-content"></div>
        </div>

        <div class="bottom-controls">
          <div class="left-buttons">
            <button class="player-button play js-play-button" type="button">
              <i class="fa fa-play" aria-hidden="true"></i>
            </button>
            <button class="player-button play js-pause-button" type="button" hidden>
              <i class="fa fa-pause" aria-hidden="true"></i>
            </button>
            <button class="player-button volume js-volume-button" type="button">
              <i class="fa fa-volume-off" aria-hidden="true"></i>
            </button>
            <button class="player-button volume js-mute-button" type="button" hidden>
              <i class="fa fa-volume-up" aria-hidden="true"></i>
            </button>
          </div>

          <div class="viewing-panel">
            <span class="js-current-time viewing-time">00:00</span>
            <div class="js-progress viewing-progressbar">
              <div class="js-progress-slider viewing-progressbar-fill"></div>
            </div>
            <span class="js-duration video-duration">00:00</span>
          </div>

          <div class="right-buttons">
            <button class="player-button fullscreen js-fullscreen-button" type="button">
              <i class="fa fa-expand" aria-hidden="true"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
  <script src="./static/player.js"></script>
  <script src="./static/bootstrap.bundle.min.js"></script>
  <script>
    createPlayer({
      elementId: 'player',
      src: 'https://dvmn.org/media/filer_public/78/db/78db3456-3fd3-4504-9ed9-d2d1fd843c0b/highest_peak.mp4'
    });
  </script>
</body>
</html>
