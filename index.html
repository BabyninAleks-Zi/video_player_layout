<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Видео плеер</title>
  <link rel="icon" type="image/svg+xml" href="./media/player-favicon.svg">
  <link rel="stylesheet" href="./static/bootstrap.min.css">
  <link rel="stylesheet" href="./static/font-awesome.min.css">
  <style>
    body {
      min-height: 100vh;
      background: #f5f5f5;
      margin: 0;
    }

    .player-shell {
      width: 806px;
      margin: 6px auto 0;
    }

    #player {
      width: 806px;
    }

    .player-frame {
      width: 806px;
      background: #0b0b0b;
      border: 1px solid #cfcfcf;
      border-radius: 0;
      overflow: hidden;
      box-shadow: none;
      display: flex;
      flex-direction: column;
    }

    .player-top-strip {
      height: 46px;
      background: #0b0b0b;
      flex: 0 0 auto;
    }

    .player-video-wrapper {
      position: relative;
      width: 100%;
      background: #000;
      height: 468px;
    }

    .player-video-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .player-video-content {
      width: 100%;
      height: 100%;
    }

    .player-controls {
      background: #0b0b0b;
      color: #fff;
      height: 85px;
      padding: 0 10px 10px;
      flex: 0 0 auto;
      display: flex;
      align-items: flex-end;
    }

    .player-controls-row {
      display: flex;
      align-items: center;
      gap: 19px;
      flex-wrap: nowrap;
      width: 100%;
      min-height: 14px;
    }

    .player-controls .btn {
      border: 0;
      background: transparent;
      color: #fff;
      padding: 0;
      line-height: 1;
    }

    .player-controls .btn:hover,
    .player-controls .btn:focus {
      background: transparent;
      color: #fff;
    }

    .player-controls .btn--transparent,
    .player-controls .btn--transparent:hover,
    .player-controls .btn--transparent:focus {
      background: transparent;
      border-color: transparent;
      box-shadow: none;
      color: #fff;
    }

    .player-controls .btn .fa {
      font-size: 20px;
    }

    .player-progress-track {
      height: 5px;
      cursor: pointer;
      background: transparent;
      border-radius: 999px;
      overflow: visible;
    }

    .player-progress {
      flex: 1;
      min-width: 80px;
    }

    .player-time-label {
      color: #fff;
      font-size: 17px;
      line-height: 1;
      white-space: nowrap;
      min-width: 60px;
      text-align: center;
    }

    .player-progress-fill {
      position: relative;
      height: 100%;
      width: 0;
      background: #ff0000;
      border-radius: 999px;
      color: transparent;
      font-size: 0;
      line-height: 0;
    }

    .player-progress-fill::after {
      content: "";
      position: absolute;
      top: 50%;
      right: -7px;
      width: 14px;
      height: 14px;
      transform: translateY(-50%);
      border-radius: 50%;
      background: #ff0000;
      border: 3px solid #ffffff;
    }

  </style>
</head>
<body>
  <main class="player-shell">
    <div id="player">
      <div class="player-frame">
        <div class="player-top-strip"></div>

        <div class="player-video-wrapper">
          <div class="player-video-container">
            <div class="js-video-container player-video-content"></div>
          </div>
        </div>

        <div class="player-controls">
          <div class="player-controls-row">
            <button class="btn btn--transparent js-play-button" type="button">
              <i class="fa fa-play" aria-hidden="true"></i>
            </button>
            <button class="btn btn--transparent js-pause-button" type="button" hidden>
              <i class="fa fa-pause" aria-hidden="true"></i>
            </button>
            <button class="btn btn--transparent js-volume-button" type="button">
              <i class="fa fa-volume-off" aria-hidden="true"></i>
            </button>
            <button class="btn btn--transparent js-mute-button" type="button" hidden>
              <i class="fa fa-volume-up" aria-hidden="true"></i>
            </button>

            <span class="js-current-time player-time-label">00:00</span>
            <div class="js-progress player-progress player-progress-track">
              <div class="js-progress-slider player-progress-fill"></div>
            </div>
            <span class="js-duration player-time-label">00:00</span>

            <button class="btn btn--transparent js-fullscreen-button" type="button">
              <i class="fa fa-expand" aria-hidden="true"></i>
            </button>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
  <script src="./static/player.js"></script>
  <script src="./static/bootstrap.bundle.min.js"></script>
  <script>
    createPlayer({
      elementId: 'player',
      src: 'https://dvmn.org/media/filer_public/78/db/78db3456-3fd3-4504-9ed9-d2d1fd843c0b/highest_peak.mp4'
    });
  </script>
</body>
</html>
