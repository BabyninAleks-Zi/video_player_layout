<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Видео плеер</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./media/player-favicon.svg">
  <link rel="stylesheet" href="./static/font-awesome.min.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
    }

    .player {
      width: 800px;
      height: 600px;
      display: flex;
      flex-direction: column;
      background: #0b0b0b;
      box-shadow: 0px 0px 24px rgba(0, 0, 0, 1);
    }

    .player__screen {
      flex-grow: 1;
      min-height: 0;
      background: #000;
    }

    .player__controls {
      padding: 0;
      display: flex;
      align-items: center;
      gap: 1px;
      background: #000;
    }

    .player__button {
      padding: 0;
      border: 0;
      line-height: 1;
      color: #fff;
      cursor: pointer;
      background: transparent;
      width: 35px;
      height: 35px;
      position: relative;
      top: -2px;
    }

    .player__button:hover,
    .player__button:focus-visible {
      color: #fff;
      background: transparent;
    }

    .player__button:focus-visible {
      outline: 2px solid #0d6efd;
      outline-offset: 2px;
    }

    .player__button .fa {
      font-size: 20px;
    }

    .player__time {
      min-width: 60px;
      color: #fff;
      text-align: center;
      white-space: nowrap;
      font-family: "Roboto", sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 1;
      position: relative;
      top: -1px;
    }

    .player__progress {
      flex: 1;
      min-width: 80px;
      height: 5px;
      position: relative;
      top: -1px;
      cursor: pointer;
      overflow: visible;
      border-radius: 999px;
      background: transparent;
    }

    .player__progress-fill {
      position: relative;
      width: 0;
      height: 100%;
      color: transparent;
      font-size: 0;
      line-height: 0;
      border-radius: 999px;
      background: #ff0000;
    }

    .player__progress-fill::after {
      content: "";
      position: absolute;
      top: 50%;
      right: -7px;
      width: 14px;
      height: 14px;
      transform: translateY(-50%);
      border: 3px solid #fff;
      border-radius: 50%;
      background: #ff0000;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .player__progress:hover .player__progress-fill::after {
      opacity: 1;
    }
  </style>
</head>
  <body>
  <div id="player" class="player">
    <div class="js-video-container player__screen"></div>
    <div class="player__controls">
      <button class="player__button player__button_type_play js-play-button" type="button">
        <i class="fa fa-play" aria-hidden="true"></i>
      </button>
      <button class="player__button player__button_type_pause js-pause-button" type="button" hidden>
        <i class="fa fa-pause" aria-hidden="true"></i>
      </button>
      <button class="player__button player__button_type_volume js-volume-button" type="button">
        <i class="fa fa-volume-off" aria-hidden="true"></i>
      </button>
      <button class="player__button player__button_type_mute js-mute-button" type="button" hidden>
        <i class="fa fa-volume-up" aria-hidden="true"></i>
      </button>
      <span class="js-current-time player__time">00:00</span>
      <div class="js-progress player__progress">
        <div class="js-progress-slider player__progress-fill"></div>
      </div>
      <span class="js-duration player__time">00:00</span>
      <button class="player__button player__button_type_fullscreen js-fullscreen-button" type="button">
        <i class="fa fa-expand" aria-hidden="true"></i>
      </button>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
  <script src="./static/player.js"></script>
  <script>
    createPlayer({
      elementId: 'player',
      src: 'https://dvmn.org/media/filer_public/78/db/78db3456-3fd3-4504-9ed9-d2d1fd843c0b/highest_peak.mp4'
    });
  </script>
</body>
</html>
